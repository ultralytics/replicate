name: Push YOLO to Replicate

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_test_push:
    name: Build, Test & Push Model
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model: [yolo11n, yolov8s-worldv2, yoloe11s, yolo26]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv pip install --system ultralytics --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_API_TOKEN }}
      - name: Download model weights
        run: python ${{ matrix.model }}/download.py
      - name: Build model image
        working-directory: ${{ matrix.model }}
        run: cog build
      - name: Test model
        working-directory: ${{ matrix.model }}
        run: cog predict -i image=@../assets/bus.jpg -i conf=0.25 -i iou=0.45
      - name: Test model size selection (temporary, yolo26 only)
        if: matrix.model == 'yolo26'
        working-directory: ${{ matrix.model }}
        run: cog predict -i image=@../assets/bus.jpg -i model_size=x
      - name: Push to Replicate
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ matrix.model }}
        run: cog push
